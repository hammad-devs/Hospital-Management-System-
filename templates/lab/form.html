{% extends "base.html" %}
{% block title %}Order Lab Test — HMS{% endblock %}
{% block topbar_title %}Order Lab Test{% endblock %}

{% block content %}
<div class="page-header">
  <div><h1>Order Lab Test</h1></div>
  <a href="{{ url_for('lab.list_tests') }}" class="btn btn-secondary">← Back</a>
</div>

<div class="card" style="max-width:600px;">
  <form method="POST" action="{{ url_for('lab.new_test') }}" novalidate>
    <div class="form-grid" style="grid-template-columns:1fr;">

      <div class="form-group">
        <label>Patient *</label>
        <select name="patient_id" required>
          <option value="">— Select Patient —</option>
          {% for p in patients %}
          <option value="{{ p.patient_id }}">{{ p.full_name }} ({{ p.patient_code }})</option>
          {% endfor %}
        </select>
      </div>

      {% if current_user.role != 'doctor' %}
      <div class="form-group">
        <label>Ordering Doctor *</label>
        <select name="doctor_id" required>
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}
          <option value="{{ d.doctor_id }}">{{ d.full_name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}

      <div class="form-group">
        <label>Test Name *</label>
        <input type="text" name="test_name"
               placeholder="e.g. Complete Blood Count, HbA1c…" required />
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" placeholder="Additional instructions…"></textarea>
      </div>

    </div>

    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary">🔬 Order Test</button>
      <a href="{{ url_for('lab.list_tests') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
