<!-- hms_web/templates/auth/change_password.html -->
{% extends "base.html" %}

{% block title %}Change Password — HMS{% endblock %}
{% block topbar_title %}Change Password{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 0 auto;">

  <div class="page-header">
    <div>
      <h1>Change Password</h1>
      <p>Update your account password below</p>
    </div>
    <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">
      ← Back
    </a>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('auth.change_password') }}"
          novalidate onsubmit="return validateForm()">

      <div class="form-grid" style="grid-template-columns: 1fr;">

        <div class="form-group">
          <label for="current_password">Current Password</label>
          <input
            type="password"
            id="current_password"
            name="current_password"
            placeholder="Enter current password"
            required
          />
        </div>

        <div class="form-group">
          <label for="new_password">New Password</label>
          <input
            type="password"
            id="new_password"
            name="new_password"
            placeholder="Minimum 8 characters"
            minlength="8"
            required
          />
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm New Password</label>
          <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Re-enter new password"
            required
          />
          <span id="match-msg" style="font-size:12px; margin-top:3px;"></span>
        </div>

      </div>

      <div class="flex gap-2 mt-3">
        <button type="submit" class="btn btn-primary">
          🔒 Update Password
        </button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary">
          Cancel
        </a>
      </div>

    </form>
  </div>

</div>
{% endblock %}

{% block extra_scripts %}
<script>
  const newPw  = document.getElementById('new_password');
  const confPw = document.getElementById('confirm_password');
  const msg    = document.getElementById('match-msg');

  function checkMatch() {
    if (!confPw.value) { msg.textContent = ''; return; }
    if (newPw.value === confPw.value) {
      msg.style.color = '#10b981';
      msg.textContent = '✅ Passwords match';
    } else {
      msg.style.color = '#ef4444';
      msg.textContent = '❌ Passwords do not match';
    }
  }

  newPw.addEventListener('input',  checkMatch);
  confPw.addEventListener('input', checkMatch);

  function validateForm() {
    if (newPw.value.length < 8) {
      alert('New password must be at least 8 characters.');
      return false;
    }
    if (newPw.value !== confPw.value) {
      alert('Passwords do not match.');
      return false;
    }
    return true;
  }
</script>
{% endblock %}
